global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerting-rules.yml

scrape_configs:
  - job_name: elcorp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["elcorp-api:8000"]
        labels:
          service: api

  - job_name: celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["elcorp-worker:9808"]
        labels:
          service: worker

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
