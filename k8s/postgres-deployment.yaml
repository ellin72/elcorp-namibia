apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: elcorp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: elcorp
            - name: POSTGRES_USER
              value: elcorp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elcorp-secrets
                  key: SECRET_KEY
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: elcorp-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: elcorp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elcorp-pgdata
  namespace: elcorp
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elcorp-uploads
  namespace: elcorp
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 2Gi
