services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      FLASK_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    command: celery -A app.celery_app:celery worker --loglevel=warning -Q default,verification,email --concurrency=4
    env_file: .env
    environment:
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  beat:
    build:
      context: .
      dockerfile: Dockerfile.production
    command: celery -A app.celery_app:celery beat --loglevel=warning
    env_file: .env
    environment:
      FLASK_ENV: production
    depends_on:
      redis:
        condition: service_started
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elcorp
      POSTGRES_USER: elcorp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elcorp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  pgdata:
  uploads:
