{% extends "merchant/base.html" %} {% set merchant = None %} {% block title
%}Login{% endblock %} {% block content %}
<div class="login-box card">
  <h2 style="margin-bottom: 1rem">Merchant Login</h2>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post">
    <label>API Key</label>
    <input
      type="password"
      name="api_key"
      placeholder="Enter your merchant API key"
      required
    />
    <button class="btn btn-primary" type="submit" style="width: 100%">
      Sign In
    </button>
  </form>
</div>
{% endblock %}
